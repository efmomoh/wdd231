<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description"
        content="LoneStar Chamber e-Commerce connects Monrovia businesses through networking, events, and a local business directory to promote economic growth.">
    <meta name="author" content="Enssah Fayia Momoh">
    <meta property="og:title" content="LoneStar Chamber e-Commerce Directory">
    <meta property="og:description"
        content="Explore LoneStar Chamber's business directory and connect with innovators. Join events and classes to grow your Monrovia business.">
    <meta property="og:url" content="https://efmomoh.github.io/wdd231/chamber/directory.html">
    <meta property="og:image" content="https://efmomoh.github.io/wdd231/chamber/images/student-enssah.webp">
    <meta property="og:image:alt" content="LoneStar e-Commerce">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="LoneStar Chamber e-Commerce">

    <title>Home | LoneStar Chamber e-Commerce</title>

    <!-- favicon  -->
    <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">

    <!-- styles  -->
    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/larger.css">

    <!-- google font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+CU+Guides&family=Roboto:ital@0;1&display=swap"
        rel="stylesheet">

    <script src="scripts/navigation.js" defer></script>
    <script src="scripts/forecast.js" defer></script>
    <script src="scripts/spotlight.js" defer></script>
    <script src="scripts/footer.js" defer></script>
</head>

<body>
    <header>
        <div id="logo-container">
            <img src="images/logo.svg" alt="logo" width="48" height="48">
            <div>
                <span class="site-name">LoneStar</span>
                <span class="site-tag">Chamber of e-Commerce</span>
            </div>
        </div>
        <nav>
            <ul id="primary-nav" class="navigation">
                <li>
                    <a class="active" href="index.html">Home</a>
                </li>
                <li>
                    <a href="directory.html">Directory</a>
                </li>
                <li>
                    <a href="join.html">Join</a>
                </li>
                <li>
                    <a href="discover.html">Discover
                    </a>
                </li>
            </ul>
        </nav>
        <div class="header-controls">

            <img src="images/circle_half_full_icon.svg" alt="Dark mode toggle">

            <button id="hamburger" aria-label="Menu"></button>
        </div>
    </header>

    <main>
        <section class="hero">
            <img src="images/hero_image.webp" alt="Hero Image">
            <div class="hero-card">
                <a href="join.html" class="cta">Join Today</a>
            </div>
        </section>

        <h1>Home</h1>

        <section class="grid">
            <section class="events">
                <h2>Events</h2>
                <p>March 30 Networking Event</p>
            </section>
            <section class="weather">
                <h2>Current Weather</h2>
                <div class="weather-details">
                    <div>
                        <img src="images/weather_icon.svg" alt="Weather Icon">
                        <p id="condition"> </p>
                    </div>
                    <div class="condition-container">
                        <p><strong>Temp:</strong> <span id="temp"></span></p>
                        <p><strong>High:</strong> <span id="high"></span></p>
                        <p><strong>Low:</strong> <span id="low"></span></p>
                        <p><Strong>Humidity:</Strong> <span id="humidity"></span></p>
                        <p><strong>Sunrise:</strong> <span id="sunrise"></span></p>
                        <p><strong>Sunset:</strong> <span id="sunset"></span></p>
                    </div>
                </div>
            </section>
            <section class="forecast">
                <h2>Weather Forecast</h2>
                <strong>3-Day Forecast</strong>
                <div id="forecast-container"></div>
            </section>
        </section>

        <section class="spotlight">
            <h2>Spotlight</h2>
            <div id="spotlight-container"></div>
        </section>
    </main>

    <footer>
        <section class="site-info">
            <p><span id="year"></span></p>

        </section>
        <section class="social-media">
            <a href="#"><img src="images/youtube_icon.svg" alt="YouTube Icon"></a>
            <a href="#"><img src="images/twitter_icon.svg" alt="Twitter Icon"></a>
            <a href="#"><img src="images/linkedin_icon.svg" alt="LinkedIn Icon"></a>
        </section>
        <section class="site-project"></section>
    </footer>

</body>

</html>
