<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description"
        content="LoneStar Chamber e-Commerce connects Monrovia businesses through networking, events, and a local business directory to promote economic growth.">
    <meta name="author" content="Enssah Fayia Momoh">
    <meta property="og:title" content="Join LoneStar Chamber e-Commerce Membership">
    <meta property="og:description"
        content="Explore LoneStar Chamber's business directory and connect with innovators. Join events and classes to grow your Monrovia business.">
    <meta property="og:url" content="https://efmomoh.github.io/wdd231/chamber/join.html">
    <meta property="og:image" content="https://efmomoh.github.io/wdd231/chamber/images/student-enssah.webp">
    <meta property="og:image:alt" content="LoneStar e-Commerce">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="LoneStar Chamber e-Commerce">

    <title>Join | Membership Form | LoneStar Chamber e-Commerce</title>

    <!-- favicon  -->
    <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">

    <!-- styles  -->
    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/larger.css">

    <!-- google font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+CU+Guides&family=Roboto:ital@0;1&display=swap"
        rel="stylesheet">

    <script src="scripts/navigation.js" defer></script>
    <script src="scripts/join.js" defer></script>
    <script src="scripts/footer.js" defer></script>
</head>

<body>
    <header>
        <div id="logo-container">
            <a href="index.html" aria-label="Home">
                <img src="images/logo.svg" alt="LoneStar Chamber logo" width="48" height="48">
                <div>
                    <span class="site-name">LoneStar</span>
                    <span class="site-tag">Chamber of e-Commerce</span>
                </div>
            </a>
        </div>
        <nav>
            <ul id="primary-nav" class="navigation">
                <li>
                    <a class="active" href="index.html">Home</a>
                </li>
                <li>
                    <a href="directory.html">Directory</a>
                </li>
                <li>
                    <a href="join.html">Join</a>
                </li>
                <li>
                    <a href="discover.html">Discover
                    </a>
                </li>
            </ul>
        </nav>
        <div class="header-controls">

            <img src="images/circle_half_full_icon.svg" alt="Dark mode toggle">

            <button id="hamburger" aria-label="Menu"></button>
        </div>
    </header>

    <main>

        <section class="form-container">
            <h1>Welcome to LoneStar Chamber e-Commerce Membership Form</h1>

            <form method="get" action="thankyou.html">
                <fieldset>
                    <legend>Membership Form</legend>

                    <label for="firstName">First Name:</label>
                    <input type="text" name="firstName" id="firstName"
                        title="Please enter your first name (Enssah, Paul, etc.)" required placeholder="Enssah"
                        autocomplete="given-name">

                    <label for="lastName">Last Name:</label>
                    <input type="text" name="lastName" id="lastName"
                        title="Please enter your last name(Momoh, Cheney metc.)" placeholder="Momoh" required
                        autocomplete="family-name">

                    <label for="usermail">Email Address:</label>
                    <input type="email" name="email" id="usermail"
                        title="Please enter your email (eg. tauruspromax@gmail.com)" required
                        placeholder="enssah25@gmail.com" autocomplete="email">

                    <label for="phoneNumber">Mobile Phone Number:</label>
                    <input type="tel" name="phone" id="phoneNumber"
                        title="Please enter your phone number (eg. 555-999-1111)" placeholder="555-555-5555"
                        autocomplete="tel" required>

                    <label for="organization-title">Organization Title:</label>
                    <input type="text" name="organization-title" id="organization-title"
                        placeholder="eg. Program Manager"
                        title="Please enter your organizationaTitle (letters, spaces, hyphens only, min 7 characters. eg. MANAGER)"
                        autocomplete="organization-title" pattern="[A-Za-z\s\-]{7,}" required>

                    <label for="businessName">Business/Organization's Name:</label>
                    <input type="text" name="business" id="businessName"
                        title="Please enter your business or organization's name (eg. TaurusProMax Inc.)"
                        placeholder="TaurusPromax Inc." autocomplete="organization" required>

                    <label for="membershipLevel">Membership Level:</label>
                    <select name="level" id="membershipLevel" required>
                        <option value="" selected disabled>Choose Membership... &#9660; </option>
                        <option value="non-profit">Non-profit Membership (Non-Profit)</option>
                        <option value="bronze">Bronze Membership (Bronze)</option>
                        <option value="silver">Silver Membership (Silver)</option>
                        <option value="gold">Gold Membership (Gold)</option>
                    </select>

                    <label for="textarea">Message (Description of your organization):</label>
                    <textarea name="message" id="textarea"
                        title="Please describe or tell us a little bit about your company."
                        placeholder="Tell us more about your business and why chose LoneStar Chamber e-Commerce?"
                        required></textarea>

                    <input type="hidden" id="timestamp" name="time">

                    <input type="submit" aria-label="Submit Application">
                </fieldset>
            </form>


            <section class="membership-container">

                <div id="membership">
                    <h2>Membership Levels</h2>

                    <button type="button" id="membership-level1">
                        Non-profit Membership Level
                        <span class="learn-more">Learn More</span>
                    </button>

                    <button type="button" id="membership-level2">
                        Bronze Membership Level
                        <span class="learn-more">Learn More</span>
                    </button>

                    <button type="button" id="membership-level3">
                        Silver Membership Level
                        <span class="learn-more">Learn More</span>
                    </button>

                    <button type="button" id="membership-level4">
                        Gold Membership Level
                        <span class="learn-more">Learn More</span>
                    </button>

                </div>
            </section>

            <section>
                <!-- business cards  -->
                <h2>Companies/Organizations</h2>

                <div id="company-card"></div>

                <!-- modals  -->
                <dialog id="modalBox">
                    <div></div>
                    <button type="submit" id="closeModal">❌</button>
                </dialog>


            </section>
        </section>


    </main>

    <footer>
        <div class="site-info">
            <p><span id="year"></span></p>
        </div>
        <div class="social-media">
            <a href="#"><img src="images/youtube-icon.svg" alt="YouTube Icon"></a>
            <a href="#"><img src="images/twitter_icon.svg" alt="Twitter Icon"></a>
            <a href="#"><img src="images/linkedin_icon.svg" alt="LinkedIn Icon"></a>
        </div>
        <div class="site-project"></div>
    </footer>

</body>

</html>
