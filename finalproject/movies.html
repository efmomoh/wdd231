<head>
    <meta charset="UTF-8">

    <meta name="description" content="Welcome to TaurusProMax movie trailer where movies of all kinds 
    are available for your leisure time">

    <meta property="og:title" content="TaurusProMax Movies">

        content="Welcome! TaurusProMax is a free movie website where you can have all the trending movies around the world from your disposal.">

    <!-- social media meta tags (twitter) -->

    <meta name="twitter:title" content="TaurusProMax Movies Hub">

        content="Welcome! TaurusProMax is a free movie website where you can have all the trending movies around the world at your disposal.">

    <!-- google fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+CU+Guides&family=Roboto:ital@0;1&display=swap"
        rel="stylesheet">

    <!-- styles -->
    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/larger.css">

    <!-- scripts  -->
    <script type="module" src="scripts/app.js"></script>
    <script src="scripts/navigation.js" defer></script>
    <script src="scripts/footer.js" defer></script>
    <!-- favorite icon  -->
    <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">

</head>

<body>
    <header>
        <img src="images/logo.webp" alt="Logo Icon Placeholder">
        <a href="#">TaurusProMax</a>
        <button id="menu" aria-label="Home menu"></button>
    </header>
    <nav id="nav-bar" class="navigation" aria-label="navigation site">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li class="active"><a href="movies.html">Movies Hub</a></li>
            <li><a href="genres.html">Genres</a></li>
        </ul>
    </nav>

    <main>
        <label for="searchInput">Search
            <input type="search" name="search" id="searchInput" placeholder="Search movies...">
        </label>

        <h2 class="h2-movies">Favorite Movies</h2>
        <div id="movies">

        </div>

        <button id="toggleBtn">See More</button>

        <form action="thankyou.html" method="get">
            <fieldset>
                <legend>Tell Us About Your Experience</legend>
                <label for="given-name">First Name: </label>
                <input type="text" name="first-name" id="given-name" title="Please enter your given name eg: Paul"
                    placeholder="Enssah" autocomplete="given-name" required>

                <label for="family-name">Last Name: </label>
                <input type="text" name="last-name" id="family-name" title="Enter your faamily name eg: Cheney"
                    placeholder="Momoh" autocomplete="family-name" required>

                <label for="usermail">Email: </label>
                <input type="email" name="email" id="usermail" title="Enter your email eg: youremail@mail.com"
                    placeholder="efmomoh25@gmail.com" autocomplete="email" required>

                <label for="message">Any Opinion? (Optional) </label>
                <textarea name="message" id="message" rows="3"
                    placeholder="Please tell us more about your interest..."></textarea>

                <input type="hidden" name="time" id="timestamp">
                <input id="send-btn" type="submit" value="Send">
            </fieldset>
        </form>

        <div id="modal" class="modal hidden">
            <div class="modal-content">
                <button id="closeModal">X</button>
                <div id="modal-body"></div>
            </div>
        </div>
    </main>



    <footer>
        <p id="year">
        </p>

        <div id="social-media">
            <a href="#"><img src="images/facebook.svg" alt="Facebook Icon"></a>
            <a href="#"><img src="images/instagram.svg" alt="Instagram Icon"></a>
            <a href="#"><img src="images/youtube.svg" alt="Youtube Icon"></a>
            <a href="#"><img src="images/tiktok.svg" alt="TikTok Icon"></a>
            <a href="#"><img src="images/twitter.svg" alt="Twitter Icon"></a>
            <a href="#"><img src="images/github.svg" alt="GitHub Icon"></a>
        </div>
        <p id="modifiedDate">
        </p>

        <div>
            <p class="present">
                <a href="https://www.loom.com/share/03caf887fabb49bcad5a9a6cf8922281" target="_blank">Presentation
                    Video</a>
            </p>
        </div>
    </footer>
</body>

</html>
